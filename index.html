<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartridge Forge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #c0c0c0;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #game-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #game-canvas {
      image-rendering: pixelated;
      border: 2px solid #333;
    }
    #sidebar {
      width: 320px;
      background: #111118;
      border-left: 2px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h2 {
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid #333;
      color: #8888ff;
    }
    #combat-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.6;
    }
    #combat-log .log-entry { margin-bottom: 4px; }
    #stats-panel {
      padding: 12px;
      border-top: 1px solid #333;
      font-size: 12px;
    }
    #cartridge-loader {
      position: absolute; top: 12px; left: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="game-viewport">
    <div id="cartridge-loader">
      <input type="file" id="cartridge-input" accept=".json" />
    </div>
    <canvas id="game-canvas" width="800" height="600"></canvas>
  </div>
  <div id="sidebar">
    <h2>COMBAT LOG</h2>
    <div id="combat-log"></div>
    <div id="stats-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
